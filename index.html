<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>意享報價查核系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --card: #16161f;
  --card2: #1e1e2a;
  --border: #2a2a3e;
  --gold: #e8c84a;
  --gold-dim: #a8922f;
  --text: #e8e8f0;
  --text-dim: #888899;
  --red: #e84a4a;
  --green: #4ae88a;
  --blue: #4a8ae8;
  --tab-h: 64px;
  --nav-h: 56px;
  --radius: 12px;
  --radius-sm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;}
a{color:var(--gold);}

#nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px;}
#nav .logo{width:36px;height:36px;border-radius:50%;background:var(--gold);color:#000;font-weight:700;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#nav .title{font-weight:700;font-size:16px;flex:1;}
#status-dot{width:10px;height:10px;border-radius:50%;background:var(--text-dim);flex-shrink:0;transition:background .3s;}
#status-dot.online{background:var(--green);}
#status-dot.offline{background:var(--red);}

#tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--text-dim);font-size:11px;cursor:pointer;padding:4px 0;position:relative;transition:color .2s;}
.tab-btn.active{color:var(--gold);}
.tab-btn .tab-icon{font-size:20px;line-height:1;}
.tab-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;}
.tab-badge.show{display:flex;}

#pages{position:fixed;top:var(--nav-h);bottom:var(--tab-h);left:0;right:0;overflow:hidden;}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding:16px;display:none;}
.page.active{display:block;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card.warn{border-color:var(--red);}
.card-title{font-weight:700;font-size:14px;margin-bottom:8px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius-sm);padding:10px 18px;font-size:14px;font-family:inherit;cursor:pointer;transition:opacity .2s;}
.btn:active{opacity:.7;}
.btn-gold{background:var(--gold);color:#000;font-weight:700;}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text);}
.btn-red{background:var(--red);color:#fff;font-weight:700;}
.btn-green{background:var(--green);color:#000;font-weight:700;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-block{width:100%;}

.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px;}
.input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;}
.input:focus{outline:none;border-color:var(--gold);}
select.input{cursor:pointer;}

.tbl-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--card2);color:var(--text-dim);font-weight:500;padding:8px 10px;text-align:left;white-space:nowrap;}
td{padding:8px 10px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.03);}
.td-up{color:var(--red);font-weight:700;}
.td-down{color:var(--green);font-weight:700;}

#toast-wrap{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:400px;}
.toast{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--text);text-align:center;animation:toastIn .3s ease;pointer-events:none;}
.toast.ok{border-color:var(--green);}
.toast.err{border-color:var(--red);}
@keyframes toastIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;}
#modal-overlay.open{display:flex;}
#modal-box{background:var(--card);border-top:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px;width:100%;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
#modal-title{font-weight:700;font-size:16px;margin-bottom:16px;}
#modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;line-height:1;}

.vendor-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:12px;}
.vendor-icon{font-size:36px;line-height:1;flex-shrink:0;}
.vendor-info{flex:1;min-width:0;}
.vendor-name{font-weight:700;font-size:15px;}
.vendor-cat{font-size:12px;color:var(--text-dim);margin-bottom:4px;}
.vendor-contact{font-size:12px;color:var(--text-dim);}
.vendor-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.rating-select{background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px 8px;cursor:pointer;}

#chat-messages{display:flex;flex-direction:column;gap:12px;padding-bottom:8px;}
.bubble-wrap{display:flex;gap:8px;}
.bubble-wrap.user{flex-direction:row-reverse;}
.bubble{max-width:82%;padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-break:break-word;}
.bubble.ai{background:var(--card2);border:1px solid var(--border);}
.bubble.user{background:var(--gold);color:#000;font-weight:500;}
.bubble table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px;}
.bubble table th{background:rgba(255,255,255,.1);padding:5px 8px;border:1px solid rgba(255,255,255,.15);}
.bubble table td{padding:5px 8px;border:1px solid rgba(255,255,255,.1);}
.typing-dots{display:inline-flex;gap:4px;padding:4px 0;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--text-dim);animation:dotBounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
#chat-input-bar{position:sticky;bottom:0;background:var(--bg);padding-top:8px;}

.compare-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.compare-card.warn{border-color:var(--red);}
.compare-card-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px;}
.compare-card-header .ci{font-size:26px;}
.compare-card-header .info{flex:1;}
.compare-card-header .vendor-n{font-weight:700;}
.compare-card-header .month-tag{font-size:11px;color:var(--text-dim);}
.compare-card-header .chevron{color:var(--text-dim);transition:transform .2s;}
.compare-card.open .chevron{transform:rotate(180deg);}
.compare-card-body{display:none;border-top:1px solid var(--border);padding:12px 16px;}
.compare-card.open .compare-card-body{display:block;}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;gap:8px;}
.item-row:last-child{border-bottom:none;}
.item-note{font-size:11px;color:var(--red);margin-top:2px;}

.pending-group{margin-bottom:16px;}
.pending-group-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px;}
.pending-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px;}
.pending-item .pname{flex:1;font-size:13px;}
.pending-item .pprice{font-size:13px;color:var(--gold);white-space:nowrap;}

.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 16px;text-align:center;cursor:pointer;transition:border-color .2s;}
.upload-zone:hover,.upload-zone:active{border-color:var(--gold);}
.upload-zone .uicon{font-size:40px;margin-bottom:8px;}
.upload-zone .ulabel{font-size:14px;color:var(--text-dim);}
.preview-table-wrap{max-height:260px;overflow:auto;border-radius:var(--radius-sm);border:1px solid var(--border);margin-top:12px;}
.col-map-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.qq-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.qq-btn{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text);cursor:pointer;transition:border-color .2s,color .2s;}
.qq-btn:hover{border-color:var(--gold);color:var(--gold);}

.setting-section{margin-bottom:24px;}
.setting-section h3{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.version-info{font-size:12px;color:var(--text-dim);text-align:center;margin-top:16px;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.flex-row{display:flex;gap:8px;}
.flex-1{flex:1;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.mt16{margin-top:16px;}
.section-sep{border:none;border-top:1px solid var(--border);margin:20px 0;}
</style>
</head>
<body>

<input type="file" id="img-input" accept="image/*" capture="environment" style="display:none">
<input type="file" id="excel-input" accept=".xlsx,.xls,.csv" style="display:none">
<input type="file" id="word-input" accept=".docx,.doc" style="display:none">

<div id="nav">
  <div class="logo">意</div>
  <div class="title">報價查核系統</div>
  <div id="status-dot" title="連線狀態"></div>
</div>

<div id="pages">

  <!-- 比對 -->
  <div class="page active" id="page-compare">
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;font-weight:500;">廠商報價總覽</div>
    <div id="dashboard-cards"></div>
    <hr class="section-sep">
    <div class="card">
      <div class="card-title">月份比對</div>
      <div class="field">
        <label>廠商</label>
        <select class="input" id="cmp-vendor"></select>
      </div>
      <div class="flex-row">
        <div class="field flex-1">
          <label>基準月</label>
          <select class="input" id="cmp-base"></select>
        </div>
        <div class="field flex-1">
          <label>比對月</label>
          <select class="input" id="cmp-target"></select>
        </div>
      </div>
      <div class="flex-row">
        <button class="btn btn-gold flex-1" onclick="doCompare()">比對</button>
        <button class="btn btn-outline btn-sm" id="cmp-export-btn" onclick="exportCompareCSV()" style="display:none">匯出CSV</button>
      </div>
    </div>
    <div id="compare-result"></div>
  </div>

  <!-- 上傳 -->
  <div class="page" id="page-upload">
    <div class="card">
      <div class="card-title">通道一：Excel / Word（不需要 API）</div>
      <div class="field">
        <label>廠商</label>
        <select class="input" id="up-vendor"></select>
      </div>
      <div class="field">
        <label>月份</label>
        <select class="input" id="up-month"></select>
      </div>
      <div class="flex-row mt8">
        <div class="upload-zone flex-1" onclick="document.getElementById('excel-input').click()">
          <div class="uicon">📊</div>
          <div class="ulabel">上傳 Excel</div>
        </div>
        <div class="upload-zone flex-1" onclick="document.getElementById('word-input').click()">
          <div class="uicon">📝</div>
          <div class="ulabel">上傳 Word</div>
        </div>
      </div>
      <div id="col-map-area" style="display:none;margin-top:14px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;">欄位對應設定</div>
        <div class="col-map-row">
          <div class="field"><label>品項欄</label><select class="input" id="map-item"></select></div>
          <div class="field"><label>單位欄</label><select class="input" id="map-unit"></select></div>
        </div>
        <div class="col-map-row">
          <div class="field"><label>價格欄</label><select class="input" id="map-price"></select></div>
          <div class="field"><label>備註欄</label><select class="input" id="map-note"></select></div>
        </div>
      </div>
      <div id="excel-preview-wrap" style="display:none">
        <div class="preview-table-wrap" id="excel-preview-table"></div>
        <div class="flex-row mt8">
          <button class="btn btn-gold flex-1" onclick="confirmExcelImport()">確認匯入</button>
          <button class="btn btn-outline btn-sm" onclick="clearExcelPreview()">清除</button>
        </div>
      </div>
      <div id="word-preview" style="display:none;margin-top:12px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:6px;">Word 解析內容</div>
        <div id="word-text" style="background:var(--card2);border-radius:var(--radius-sm);padding:12px;font-size:12px;max-height:200px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--border);"></div>
        <button class="btn btn-outline btn-sm mt8" onclick="clearWordPreview()">清除</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">通道二：圖片 + AI（需要 Gemini API Key）</div>
      <div id="no-api-warn" style="font-size:12px;color:var(--text-dim);background:rgba(232,74,74,.08);border:1px solid rgba(232,74,74,.3);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:10px;">尚未設定 Gemini API Key，請至設定頁面輸入。</div>
      <div class="field">
        <label>廠商（AI 通道）</label>
        <select class="input" id="ai-vendor"></select>
      </div>
      <div class="field">
        <label>月份（AI 通道）</label>
        <select class="input" id="ai-month"></select>
      </div>
      <div class="upload-zone" onclick="document.getElementById('img-input').click()">
        <div class="uicon">📸</div>
        <div class="ulabel">拍照或選取圖片</div>
      </div>
      <div id="img-preview-wrap" style="display:none;margin-top:12px;">
        <img id="img-preview" style="max-width:100%;border-radius:var(--radius-sm);max-height:200px;object-fit:contain;display:block;">
        <div class="flex-row mt8">
          <button class="btn btn-gold flex-1" onclick="runGeminiOCR()">AI 辨識</button>
          <button class="btn btn-outline btn-sm" onclick="clearImgPreview()">清除</button>
        </div>
      </div>
      <div id="ai-result-wrap" style="display:none;margin-top:12px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:6px;">AI 辨識結果（可編輯）</div>
        <textarea class="input" id="ai-result-text" rows="8" style="font-size:12px;font-family:monospace;white-space:pre;"></textarea>
        <button class="btn btn-gold btn-block mt8" onclick="confirmAiImport()">確認匯入</button>
      </div>
    </div>
  </div>

  <!-- 廠商 -->
  <div class="page" id="page-vendor">
    <div id="vendor-cards"></div>
  </div>

  <!-- 待處理 -->
  <div class="page" id="page-pending">
    <div id="pending-content"></div>
  </div>

  <!-- 問答 -->
  <div class="page" id="page-chat" style="display:none;flex-direction:column;padding-bottom:0;overflow:hidden;">
    <div class="qq-wrap" id="qq-wrap">
      <button class="qq-btn" onclick="sendQuickQ('牛小排近三個月的單價趨勢如何？')">牛小排近三月趨勢</button>
      <button class="qq-btn" onclick="sendQuickQ('近一個月哪些品項漲幅超過5%？')">近月漲幅&gt;5%</button>
      <button class="qq-btn" onclick="sendQuickQ('全富最新一期的所有報價品項是什麼？')">全富最新報價</button>
      <button class="qq-btn" onclick="sendQuickQ('目前有哪些待確認的品項？')">待確認品項</button>
      <button class="qq-btn" onclick="sendQuickQ('請比較鮭魚和干貝的歷史單價趨勢。')">鮭魚vs干貝</button>
      <button class="qq-btn" onclick="sendQuickQ('請列出所有品項中單價最高的前10名。')">單價TOP10</button>
    </div>
    <div id="chat-messages" style="flex:1;overflow-y:auto;"></div>
    <div id="chat-input-bar">
      <div class="flex-row">
        <textarea class="input" id="chat-input" placeholder="輸入問題... (Enter送出，Shift+Enter換行)" rows="1" style="flex:1;resize:none;min-height:44px;max-height:120px;"></textarea>
        <button class="btn btn-gold" onclick="sendChat()" style="align-self:flex-end;height:44px;white-space:nowrap;">送出</button>
        <button class="btn btn-outline btn-sm" onclick="clearChat()" style="align-self:flex-end;height:44px;">清除</button>
      </div>
    </div>
  </div>

  <!-- 設定 -->
  <div class="page" id="page-settings">
    <div class="setting-section">
      <h3>後端連線</h3>
      <div class="field">
        <label>Google Apps Script URL</label>
        <input class="input" type="url" id="gas-url-input" placeholder="https://script.google.com/macros/s/...">
      </div>
      <div class="flex-row">
        <button class="btn btn-outline flex-1" onclick="testConnection()">測試連線</button>
        <button class="btn btn-gold flex-1" onclick="saveSettings()">儲存設定</button>
      </div>
    </div>
    <div class="setting-section">
      <h3>AI 設定（Gemini）</h3>
      <div class="field">
        <label>Gemini API Key</label>
        <input class="input" type="password" id="gemini-key-input" placeholder="AIza...">
      </div>
      <div class="field">
        <label>模型</label>
        <select class="input" id="gemini-model-input">
          <option value="gemini-2.0-flash">gemini-2.0-flash（預設）</option>
          <option value="gemini-1.5-flash">gemini-1.5-flash</option>
          <option value="gemini-1.5-pro">gemini-1.5-pro</option>
        </select>
      </div>
      <button class="btn btn-gold btn-block" onclick="saveSettings()">儲存 AI 設定</button>
    </div>
    <div class="setting-section">
      <h3>系統操作</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-outline btn-block" onclick="enableNotifications()">啟用通知</button>
        <button class="btn btn-outline btn-block" onclick="initSheets()">初始化 Google Sheets</button>
      </div>
    </div>
    <div class="version-info">意享報價查核系統 v1.0.0 &nbsp;|&nbsp; 2026-05</div>
  </div>

</div>

<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab(this,'compare')">
    <span class="tab-icon">📊</span><span>比對</span>
  </button>
  <button class="tab-btn" onclick="switchTab(this,'upload')">
    <span class="tab-icon">📸</span><span>上傳</span>
  </button>
  <button class="tab-btn" onclick="switchTab(this,'vendor')">
    <span class="tab-icon">🏪</span><span>廠商</span>
  </button>
  <button class="tab-btn" onclick="switchTab(this,'pending')">
    <span class="tab-icon">⚠️</span><span>待處理</span>
    <span class="tab-badge" id="pending-badge">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab(this,'chat')">
    <span class="tab-icon">💬</span><span>問答</span>
  </button>
  <button class="tab-btn" onclick="switchTab(this,'settings')">
    <span class="tab-icon">⚙️</span><span>設定</span>
  </button>
</div>

<div id="toast-wrap"></div>

<div id="modal-overlay" onclick="maybeCloseModal(event)">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-title"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
var CONFIG = {
  gasUrl: localStorage.getItem('gasUrl') || '',
  geminiKey: localStorage.getItem('geminiKey') || '',
  geminiModel: localStorage.getItem('geminiModel') || 'gemini-2.0-flash',
  stores: ['新店', '林口'],
};

var VENDORS_DEFAULT = [

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toast(msg, type) {
  var wrap = document.getElementById('toast-wrap');
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function() {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(function(){ el.remove(); }, 300);
  }, 3500);
}

function showModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function genMonths(n) {
  n = n || 36;
  var months = [];
  var now = new Date();
  for (var i = 0; i < n; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var val = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    var label = d.getFullYear() + '年' + (d.getMonth()+1) + '月';
    months.push({val:val, label:label});
  }
  return months;
}

function fillMonthSelect(selId) {
  var sel = document.getElementById(selId);
  if (!sel) return;
  sel.innerHTML = '';
  genMonths().forEach(function(m) {
    var o = document.createElement('option');
    o.value = m.val;
    o.textContent = m.label;
    sel.appendChild(o);
  });
}

function getRecordsLocal() {
  try { return JSON.parse(localStorage.getItem('local_records') || '[]'); }
  catch(e) { return []; }
}
function saveRecordsLocal(arr) {
  localStorage.setItem('local_records', JSON.stringify(arr));
}
function getVendorsLocal() {
  try {
    var v = JSON.parse(localStorage.getItem('local_vendors') || 'null');
    if (v && v.length) return v;
  } catch(e) {}
  return JSON.parse(JSON.stringify(VENDORS_DEFAULT));
}
function saveVendorsLocal(arr) {
  localStorage.setItem('local_vendors', JSON.stringify(arr));
}
function isLocalMode() { return !CONFIG.gasUrl; }

async function callGAS(params) {
  var res = await fetch(CONFIG.gasUrl, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(params),
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  var data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function getRecords() {
  if (isLocalMode()) return getRecordsLocal();
  var d = await callGAS({action:'getRecords'});
  return d.records || [];
}

async function addRecord(rec) {
  if (isLocalMode()) {
    var arr = getRecordsLocal();
    rec.rowIndex = arr.length;
    arr.push(rec);
    saveRecordsLocal(arr);
    return;
  }
  await callGAS({action:'addRecord', record:rec});
}

async function updateRecord(rec) {
  if (isLocalMode()) {
    var arr = getRecordsLocal();
    var idx = arr.findIndex(function(r){ return r.rowIndex === rec.rowIndex; });
    if (idx >= 0) arr[idx] = rec;
    saveRecordsLocal(arr);
    return;
  }
  await callGAS({action:'updateRecord', record:rec});
}

async function getVendors() {
  if (isLocalMode()) return getVendorsLocal();
  var d = await callGAS({action:'getVendors'});
  return d.vendors || [];
}

async function updateVendor(v) {
  if (isLocalMode()) {
    var arr = getVendorsLocal();
    var idx = arr.findIndex(function(x){ return x.name === v.name; });
    if (idx >= 0) arr[idx] = v; else arr.push(v);
    saveVendorsLocal(arr);
    return;
  }
  await callGAS({action:'updateVendor', vendor:v});
}

async function doCompare() {
  var vendor = document.getElementById('cmp-vendor').value;
  var base   = document.getElementById('cmp-base').value;
  var target = document.getElementById('cmp-target').value;
  var wrap   = document.getElementById('compare-result');
  if (!vendor || !base || !target) { toast('請選擇廠商與月份','err'); return; }
  if (base === target) { toast('基準月與比對月不能相同','err'); return; }
  wrap.innerHTML = '<div style="color:var(--text-dim);font-size:13px;margin-top:8px;text-align:center;">比對中...</div>';
  try {
    var baseItems, targetItems;
    if (isLocalMode()) {
      var records = await getRecords();
      baseItems   = records.filter(function(r){ return r.vendor===vendor && r.month===base; });
      targetItems = records.filter(function(r){ return r.vendor===vendor && r.month===target; });
    } else {
      var d = await callGAS({action:'compareMonths', vendor:vendor, baseMonth:base, targetMonth:target});
      baseItems   = d.base   || [];
      targetItems = d.target || [];
    }

    if (baseItems.length===0 && targetItems.length===0) {
      wrap.innerHTML = '<div class="card"><div style="color:var(--text-dim);">此廠商在所選月份無資料。</div></div>';
      return;
    }

    var baseMap={}, targetMap={};
    baseItems.forEach(function(r){ baseMap[r.item_name]=r; });
    targetItems.forEach(function(r){ targetMap[r.item_name]=r; });
    var allItems = [];
    Object.keys(baseMap).forEach(function(k){ if(allItems.indexOf(k)<0) allItems.push(k); });
    Object.keys(targetMap).forEach(function(k){ if(allItems.indexOf(k)<0) allItems.push(k); });
    allItems.sort();

    var rows = '';
    var tableData = [];
    allItems.forEach(function(name) {
      var b = baseMap[name];
      var t = targetMap[name];
      var bp = b ? (parseFloat(b.price)||0) : null;
      var tp = t ? (parseFloat(t.price)||0) : null;
      var diffStr = '—', cls = '';
      if (bp!==null && tp!==null) {
        if (bp!==0) {
          var pct = ((tp-bp)/bp*100).toFixed(1);
          if (tp > bp)      { cls='td-up';   diffStr = '↑'+Math.abs(pct)+'%'; }
          else if (tp < bp) { cls='td-down'; diffStr = '↓'+Math.abs(pct)+'%'; }
        }
      } else if (bp===null) { diffStr='新增'; }
        else if (tp===null) { diffStr='已移除'; }

      var alertBg = (cls==='td-up' && parseFloat(diffStr)>5) ? 'background:rgba(232,74,74,.08);' : '';
      rows += '<tr style="' + alertBg + '">' +
        '<td>' + escHtml(name) + '</td>' +
        '<td>' + escHtml((b||t||{}).unit||'') + '</td>' +
        '<td>' + (bp!==null ? '$'+bp : '—') + '</td>' +
        '<td>' + (tp!==null ? '$'+tp : '—') + '</td>' +
        '<td class="' + cls + '">' + diffStr + '</td>' +
        '</tr>';
      tableData.push({name:name, unit:(b||t||{}).unit||'', base:bp, target:tp, diff:diffStr});
    });

    lastCompareData = {vendor:vendor, base:base, target:target, tableData:tableData};
    document.getElementById('cmp-export-btn').style.display = '';

    wrap.innerHTML = '<div class="card" style="padding:0;">' +
      '<div style="padding:12px 16px;font-size:13px;font-weight:700;">' + escHtml(vendor) + ' | ' + escHtml(base) + ' vs ' + escHtml(target) + '</div>' +
      '<div class="tbl-wrap"><table>' +
      '<thead><tr><th>品項</th><th>單位</th><th>' + escHtml(base) + '</th><th>' + escHtml(target) + '</th><th>漲跌</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div></div>';
  } catch(e) {
    wrap.innerHTML = '<div class="card"><div style="color:var(--red);">比對失敗：' + escHtml(e.message) + '</div></div>';
  }
}

function exportCompareCSV() {
  if (!lastCompareData) return;
  var vendor = lastCompareData.vendor, base = lastCompareData.base, target = lastCompareData.target;
  var csv = '﻿品項,單位,' + base + ',' + target + ',漲跌\n';
  lastCompareData.tableData.forEach(function(r) {
    csv += [r.name, r.unit, r.base!=null?r.base:'', r.target!=null?r.target:'', r.diff]
      .map(function(v){ return '"' + String(v).replace(/"/g,'""') + '"'; }).join(',') + '\n';
  });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = vendor + '_' + base + '_vs_' + target + '.csv';
  a.click();
  toast('已匯出 CSV', 'ok');
}

var excelData = null;

document.getElementById('excel-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb = XLSX.read(ev.target.result, {type:'binary'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (!json || json.length < 2) { toast('檔案無資料','err'); return; }
      var headers = json[0].map(String);
      var rows = json.slice(1).filter(function(r){ return r.some(function(c){ return c!==''; }); });
      excelData = {headers:headers, rows:rows};
      renderExcelPreview(headers, rows);
      fillColMap(headers);
      loadColMapMemory(document.getElementById('up-vendor').value, headers);
    } catch(err) {
      toast('Excel 解析失敗：' + err.message, 'err');
    }
  };
  reader.readAsBinaryString(file);
  this.value = '';
});

function renderExcelPreview(headers, rows) {
  var show = Math.min(rows.length, 20);
  var html = '<table><thead><tr>' + headers.map(function(h){ return '<th>'+escHtml(h)+'</th>'; }).join('') + '</tr></thead><tbody>';
  for (var i=0; i<show; i++) {
    html += '<tr>' + rows[i].map(function(c){ return '<td>'+escHtml(c)+'</td>'; }).join('') + '</tr>';
  }
  if (rows.length > show) html += '<tr><td colspan="' + headers.length + '" style="color:var(--text-dim);text-align:center;">...還有 '+(rows.length-show)+' 行</td></tr>';
  html += '</tbody></table>';
  document.getElementById('excel-preview-table').innerHTML = html;
  document.getElementById('excel-preview-wrap').style.display = '';
}

function fillColMap(headers) {
  ['map-item','map-unit','map-price','map-note'].forEach(function(id) {
    var sel = document.getElementById(id);
    sel.innerHTML = '<option value="">(無)</option>';
    headers.forEach(function(h, i) {
      var o = document.createElement('option');
      o.value = i; o.textContent = h;
      sel.appendChild(o);
    });
  });

}

function loadColMapMemory(vendor, headers) {
  try {
    var mem = JSON.parse(localStorage.getItem('colmap_' + vendor) || 'null');
    if (mem) {
      setMapSel('map-item',  mem.item);
      setMapSel('map-unit',  mem.unit);
      setMapSel('map-price', mem.price);
      setMapSel('map-note',  mem.note);
      return;
    }
  } catch(e) {}
  // Auto-detect
  headers.forEach(function(h, i) {
    var hl = h.toLowerCase();
    if (/品名|品項|名稱|item/.test(hl))   setMapSel('map-item',  i);
    else if (/單位|unit/.test(hl))         setMapSel('map-unit',  i);
    else if (/價格|單價|price/.test(hl))   setMapSel('map-price', i);
    else if (/備註|note|remark/.test(hl))  setMapSel('map-note',  i);
  });
}

function setMapSel(id, val) {
  var sel = document.getElementById(id);
  if (sel && val!=null && val!=='') sel.value = val;
}

function saveColMapMemory(vendor) {

async function runGeminiOCR() {
  if (!CONFIG.geminiKey) { toast('請先設定 Gemini API Key','err'); return; }
  var imgEl = document.getElementById('img-preview');
  var src = imgEl.src;
  if (!src || src === window.location.href) { toast('請先選取圖片','err'); return; }
  var base64 = src.split(',')[1];
  var mimeMatch = src.match(/data:([^;]+);/);
  var mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
  toast('AI 辨識中...', '');
  try {
    var result = await callGeminiVision(base64, mime);
    document.getElementById('ai-result-text').value = result;
    document.getElementById('ai-result-wrap').style.display = '';
    toast('辨識完成', 'ok');
  } catch(e) {
    toast('辨識失敗：' + e.message, 'err');
  }
}

async function callGeminiVision(base64, mime) {
  var models = [CONFIG.geminiModel, 'gemini-2.0-flash', 'gemini-1.5-flash'];
  var seen = [];
  var deduped = models.filter(function(m) {
    if (seen.indexOf(m) >= 0) return false;
    seen.push(m); return true;
  });
  var prompt = '請辨識這張報價單圖片，將所有品項以JSON陣列格式回答，每項包含：item_name, unit, price, note。只回答JSON，不需要其他說明。';
  var lastErr;
  for (var i=0; i<deduped.length; i++) {
    var model = deduped[i];
    try {
      var res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + CONFIG.geminiKey,
        {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            contents:[{parts:[
              {text:prompt},
              {inlineData:{mimeType:mime, data:base64}}
            ]}]
          })
        }
      );
      if (!res.ok) { var et = await res.text(); throw new Error(et); }
      var d = await res.json();
      return (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0].text) || '（無回覆）';
    } catch(e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('所有模型均失敗');
}

async function confirmAiImport() {

  } catch(e) {
    toast('無法解析 AI 回覆為 JSON，請手動調整後再試','err');
    return;
  }
  try {
    for (var i=0; i<items.length; i++) {
      var item = items[i];
      await addRecord({
        vendor:    vendor,
        month:     month,
        store:     CONFIG.stores[0],
        item_name: String(item.item_name||'').trim(),
        unit:      String(item.unit||'').trim(),
        price:     String(item.price||'').trim(),
        note:      String(item.note||'').trim(),

      });

  } catch(e) {
    toast('匯入失敗：' + e.message, 'err');
  }
}

var chatHistory = [];

function formatAIMarkdown(text) {
  if (!text) return '';
  var html = escHtml(text);
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Tables
  html = html.replace(/((?:\|[^\n]*\|(?:\n|$))+)/g, function(match) {
    var lines = match.trim().split('\n').filter(function(l){ return l.trim(); });
    if (lines.length < 2) return match;
    var thtml = '<table>';
    var first = true;
    lines.forEach(function(line) {
      if (/^\|[-:| ]+\|$/.test(line.trim())) return;
      var cells = line.replace(/^\||\|$/g,'').split('|');
      if (first) {
        thtml += '<tr>' + cells.map(function(c){ return '<th>'+c.trim()+'</th>'; }).join('') + '</tr>';
        first = false;
      } else {
        thtml += '<tr>' + cells.map(function(c){ return '<td>'+c.trim()+'</td>'; }).join('') + '</tr>';
      }
    });
    thtml += '</table>';
    return thtml;
  });
  html = html.replace(/\n/g, '<br>');
  return html;
}

function appendBubble(role, content, id) {
  var msgs = document.getElementById('chat-messages');
  var wrap = document.createElement('div');
  wrap.className = 'bubble-wrap' + (role==='user'?' user':'');
  var bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role==='user'?'user':'ai');
  if (id) bubble.id = id;
  if (content === '__typing__') {
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else {
    bubble.innerHTML = formatAIMarkdown(content);
  }
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

async function sendChat() {
  var input = document.getElementById('chat-input');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.style.height = '';
  if (!CONFIG.geminiKey) { toast('請先設定 Gemini API Key','err'); return; }
  appendBubble('user', msg);
  chatHistory.push({role:'user', text:msg});
  appendBubble('ai', '__typing__', 'typing-bubble');
  try {
    var records = await getRecords();
    var dataJson = JSON.stringify(records.slice(0,300));
    var systemPrompt = '你是意享餐廳集團的報價查核 AI 助理。\n你的任務是根據以下報價資料庫，用繁體中文回答主管的問題。\n規則：\n1. 回答要精準、簡潔，直接給結論\n2. 有數字比較時，必須用 Markdown 表格呈現\n3. 漲價用 ↑ 符號，降價用 ↓，持平用 —\n4. 表格欄位：月份｜單價｜漲跌幅（如適用）\n5. 最後附上一句簡短的分析結論\n報價資料（JSON）：' + dataJson;

    var recentHistory = chatHistory.slice(-12);
    var contents = [];
    contents.push({role:'user', parts:[{text:systemPrompt}]});
    contents.push({role:'model', parts:[{text:'好的，我已了解報價資料。請提問。'}]});
    recentHistory.slice(0,-1).forEach(function(h) {
      contents.push({role:h.role==='user'?'user':'model', parts:[{text:h.text}]});
    });
    contents.push({role:'user', parts:[{text:msg}]});

    var res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/' + CONFIG.geminiModel + ':generateContent?key=' + CONFIG.geminiKey,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({contents:contents})
      }
    );
    if (!res.ok) { var et = await res.text(); throw new Error(et); }
    var d = await res.json();
    var reply = (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts[0].text) || '（無回覆）';
    var tb = document.getElementById('typing-bubble');
    if (tb) tb.parentElement.remove();
    appendBubble('ai', reply);
    chatHistory.push({role:'ai', text:reply});
    if (chatHistory.length > 24) chatHistory = chatHistory.slice(-24);
  } catch(e) {
    var tb2 = document.getElementById('typing-bubble');
    if (tb2) tb2.parentElement.remove();
    appendBubble('ai', '錯誤：' + e.message);
    toast('AI 回覆失敗：' + e.message, 'err');
  }
}

function sendQuickQ(q) {
  document.getElementById('chat-input').value = q;

}
